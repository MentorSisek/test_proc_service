volumes:
  postgresdata:
  rabbitmqdata:

networks:
  backend:
    driver: bridge

services:
  postgres:
    image: postgres:17
    container_name: pp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - postgresdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4.2.1-management
    container_name: pp_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    restart: unless-stopped
    networks:
      - backend
    ports:
      - "127.0.0.1:${RABBITMQ_WEB_PORT}:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "status"]
      interval: 10s
      timeout: 10s
      retries: 5

  migrations:
    build:
      context: .
    container_name: pp_migrations
    env_file: .env
    command: uv run alembic -c pyproject.toml upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  api:
    build:
      context: .
    container_name: pp_api
    restart: unless-stopped
    env_file: .env
    command: uv run uvicorn presentation.api.main:app --host 0.0.0.0 --port 8000
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - backend
    ports:
      - "127.0.0.1:${API_PORT}:8000"

  consumer:
    build:
      context: .
    container_name: pp_consumer
    restart: unless-stopped
    env_file: .env
    command: uv run faststream run presentation.consumer.main:app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    networks:
      - backend
